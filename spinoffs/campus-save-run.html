<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAWN Campus Save Run</title>
  <style>
    :root { --green:#00c896; --gold:#f5b732; --ink:#040807; --muted:#bfd0c8; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; overflow:hidden; background:#030706; color:#fff; font-family:Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
    .stage { position:fixed; inset:0; background:
      radial-gradient(circle at 16% 20%, rgba(245,183,50,.2), transparent 28%),
      radial-gradient(circle at 80% 62%, rgba(0,200,150,.26), transparent 34%),
      linear-gradient(135deg, #030706, #06231b 60%, #050807); }
    .campus-lines { position:absolute; inset:-10%; background: repeating-linear-gradient(145deg, transparent 0 42px, rgba(255,255,255,.08) 43px 45px, transparent 46px 92px); animation: move 6s linear infinite; opacity:.36; }
    .hero { position:absolute; left:64px; top:58px; width:438px; padding:26px; border-radius:24px; background:rgba(0,0,0,.64); border:1px solid rgba(255,255,255,.13); }
    .hero b { color:var(--green); font-size:12px; letter-spacing:1.7px; text-transform:uppercase; }
    h1 { font-size:58px; line-height:.92; margin:18px 0 12px; letter-spacing:-1.5px; }
    p { color:var(--muted); font-size:19px; line-height:1.45; margin:0; }
    .runway { position:absolute; left:44px; right:44px; bottom:56px; height:124px; border-radius:28px; background:rgba(0,0,0,.44); border:1px solid rgba(255,255,255,.1); overflow:hidden; }
    .runway::before { content:""; position:absolute; inset:58px 0 auto; height:2px; background:linear-gradient(90deg, transparent, var(--green), var(--gold), transparent); animation:pulse 2s infinite; }
    .fawn { position:absolute; left:72px; bottom:78px; width:114px; filter:drop-shadow(0 0 20px rgba(245,183,50,.42)); animation:fawnRun 10s ease-in-out infinite; }
    .buck { position:absolute; left:660px; bottom:52px; width:230px; opacity:0; filter:drop-shadow(0 0 26px rgba(0,200,150,.48)); animation:buckRun 10s ease-in-out infinite; }
    .cards { position:absolute; right:72px; top:72px; width:590px; height:410px; }
    .shot { position:absolute; inset:0; border-radius:28px; overflow:hidden; border:1px solid rgba(0,200,150,.3); box-shadow:0 32px 110px rgba(0,0,0,.5); animation: shotSwap 12s infinite; }
    .shot:nth-child(2) { animation-delay:4s; opacity:0; }
    .shot:nth-child(3) { animation-delay:8s; opacity:0; }
    .shot img { width:100%; height:100%; object-fit:cover; filter:brightness(.72) saturate(1.22); }
    .deals { position:absolute; left:64px; top:360px; display:grid; gap:12px; width:440px; }
    .deal { padding:14px 16px; border-radius:17px; background:rgba(0,0,0,.58); border:1px solid rgba(0,200,150,.18); display:flex; justify-content:space-between; gap:18px; font-weight:800; animation:dealPop 9s infinite; }
    .deal:nth-child(2){animation-delay:1.2s}.deal:nth-child(3){animation-delay:2.4s}.deal:nth-child(4){animation-delay:3.6s}
    .deal span { color:var(--gold); }
    .meter { position:absolute; left:64px; bottom:206px; width:418px; }
    .meter label { display:block; color:#e8fff4; font-size:15px; font-weight:900; margin-bottom:10px; }
    .bar { height:16px; border-radius:100px; border:1px solid rgba(0,200,150,.36); background:#071411; overflow:hidden; }
    .fill { width:0; height:100%; background:linear-gradient(90deg,var(--gold),var(--green)); animation: fill 10s linear infinite; }
    .caption { position:absolute; right:84px; bottom:72px; color:#eafff6; font-weight:900; font-size:30px; letter-spacing:-.8px; }
    @keyframes move { to { transform:translateX(-170px); } }
    @keyframes pulse { 50% { opacity:.3; } }
    @keyframes fawnRun { 0%,42%{transform:translateX(0);opacity:1} 58%,100%{transform:translateX(500px);opacity:0} }
    @keyframes buckRun { 0%,42%{transform:translateX(-210px);opacity:0} 58%,100%{transform:translateX(260px);opacity:1} }
    @keyframes shotSwap { 0%,28%{opacity:1;transform:none} 33%,100%{opacity:0;transform:scale(.97) translateY(18px)} }
    @keyframes dealPop { 12%,26%{border-color:var(--green); transform:translateX(10px); color:var(--green);} }
    @keyframes fill { 0%{width:8%} 48%{width:48%} 100%{width:96%} }
  </style>
</head>
<body>
  <main class="stage">
    <div class="campus-lines"></div>
    <section class="hero"><b>FAWN campus mode</b><h1>Run the campus. Keep the bucks.</h1><p>Local deals, national student perks, and school-aware savings inside the account flow.</p></section>
    <section class="cards">
      <div class="shot"><img src="../assets/video-captures/campus-savings.png" alt="Campus savings page" /></div>
      <div class="shot"><img src="../assets/video-captures/signup.png" alt="Signup page" /></div>
      <div class="shot"><img src="../assets/video-captures/dashboard.png" alt="Dashboard page" /></div>
    </section>
    <div class="deals">
      <div class="deal">Campus discounts <span>found</span></div>
      <div class="deal">Student perks <span>stacked</span></div>
      <div class="deal">AI news query <span>saved</span></div>
      <div class="deal">Founding member value <span>$25 / shares</span></div>
    </div>
    <div class="meter"><label>Dollar Buck Meter</label><div class="bar"><div class="fill"></div></div></div>
    <div class="runway"></div>
    <img class="fawn" src="../assets/fawn-quarter-real.png" alt="" />
    <img class="buck" src="../assets/buck-dollar-real.png" alt="" />
    <div class="caption">Quarter skin to dollar skin.</div>
  </main>
</body>
</html>
