<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - FAWN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b10;
      --surface: #0e1318;
      --border: #1e2730;
      --accent: #00c896;
      --accent-dim: rgba(0,200,150,0.12);
      --text: #e8edf2;
      --muted: #6b7a8d;
      --error: #ff4d6d;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 32px; text-decoration: none; }
    .logo span { color: var(--text); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 0.925rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .form-error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); border-radius: 10px; padding: 12px 14px; color: var(--error); font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .form-success { background: var(--accent-dim); border: 1px solid rgba(0,200,150,0.3); border-radius: 10px; padding: 12px 14px; color: var(--accent); font-size: 0.85rem; margin-bottom: 16px; display: none; }

    .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none; transition: opacity 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .signup-link { margin-top: 20px; text-align: center; font-size: 0.85rem; color: var(--muted); }
    .signup-link a { color: var(--accent); text-decoration: none; }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="stylesheet" href="assets/fawn-polish.css" />
  <script src="assets/fawn-api.js"></script>
</head>
<body>
  <a class="logo" href="index.html">FAWN</a>

  <div class="card">
    <h1>Set a new password</h1>
    <p class="subtitle" id="subtitle">Enter a new password for your account.</p>

    <div class="form-error" id="err"></div>
    <div class="form-success" id="ok"></div>

    <div id="form-fields">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Re-enter your new password" autocomplete="new-password">
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="doReset()">Reset password</button>
    </div>

    <div class="signup-link"><a href="login.html">Back to sign in</a></div>
  </div>

  <script>
    const API = window.FAWN_API_BASE || 'https://web-production-13d5b.up.railway.app';

    function showErr(msg) {
      const el = document.getElementById('err');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
    function showOk(msg) {
      const el = document.getElementById('ok');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    const token = getToken();
    if (!token) {
      showErr('This reset link is missing a token. Request a new one from the forgot password page.');
      document.getElementById('form-fields').style.display = 'none';
    }

    async function doReset() {
      showErr('');
      showOk('');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');

      if (!password || password.length < 8) { showErr('Password must be at least 8 characters'); return; }
      if (password !== confirm) { showErr('Passwords do not match'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Resetting...';

      try {
        const resp = await fetch(API + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: password }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          showErr(data.detail || 'Could not reset password. The link may be expired.');
          btn.disabled = false;
          btn.textContent = 'Reset password';
          return;
        }

        showOk(data.message || 'Password updated. You can now log in.');
        document.getElementById('form-fields').style.display = 'none';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (e) {
        showErr('Network error. Check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    }

    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });
  </script>
  <script src="assets/fawn-polish.js" defer></script>
</body>
</html>
