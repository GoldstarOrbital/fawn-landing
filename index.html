  <style>
    /* =============================================
       CRITICAL ABOVE-THE-FOLD CSS (inlined)
       ============================================= */
    :root {
      --green: #00c896;
      --green-dark: #00a87e;
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --ease: cubic-bezier(0.22, 1, 0.36, 1); /* smooth, organic deceleration — used for hover/lift motion site-wide */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      /* Prevent horizontal scroll on mobile */
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 48px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 200;
    }

    .nav-logo { font-size: 1.5rem; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }

    .nav-links { display: flex; gap: 32px; }

    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      padding: 10px 22px;
      background: var(--green);
      color: #000; font-weight: 700; font-size: 0.85rem;
      border: none; border-radius: 8px; cursor: pointer;
      text-decoration: none;
      transition: background 0.25s var(--ease), transform 0.25s var(--ease);
    }

    .nav-cta:hover { background: var(--green-dark); transform: translateY(-1px); }

    /* Hamburger */
    .nav-hamburger {
      display: none;
      flex-direction: column; gap: 5px; cursor: pointer;
      background: none; border: none; padding: 4px;
    }

    .nav-hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all 0.2s;
    }

    .mobile-menu {
      display: none;
      position: fixed; top: 57px; left: 0; right: 0;
      background: rgba(13,13,13,0.98);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      z-index: 199;
      flex-direction: column; gap: 0;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: var(--muted); text-decoration: none; font-size: 1rem;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }

    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--text); }

    /* ROADMAP HIGHLIGHT CARD */
    .roadmap-highlight-section {
      padding: 100px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .roadmap-highlight-card {
      background: linear-gradient(135deg, rgba(0,200,150,0.08), rgba(0,200,150,0.02));
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      transition: all 0.3s var(--ease);
    }

    .roadmap-highlight-card:hover {
      border-color: var(--green);
      box-shadow: 0 24px 48px rgba(0,200,150,0.15);
      transform: translateY(-4px);
    }

    .roadmap-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,200,150,0.1);
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 0.75rem;
      color: var(--green);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .roadmap-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .roadmap-highlight-card h3 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .roadmap-highlight-card h3 span { color: var(--green); }

    .roadmap-highlight-card p {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.7;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .roadmap-highlight-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s var(--ease);
    }

    .roadmap-highlight-cta:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,200,150,0.25);
    }

    /* STICKY WAITLIST CTA (desktop floating pill) */
    .sticky-cta {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 150;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sticky-cta.visible { opacity: 1; pointer-events: auto; }

    .sticky-cta a {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px;
      background: var(--green); color: #000;
      font-weight: 800; font-size: 0.95rem;
      border-radius: 100px;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0,200,150,0.35);
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .sticky-cta a:hover { background: var(--green-dark); transform: translateY(-2px); }

    /* MOBILE STICKY BOTTOM BAR */
    .mobile-sticky-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 150;
      background: rgba(13,13,13,0.97);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-sticky-bar.visible { opacity: 1; pointer-events: auto; }

    .mobile-sticky-bar a {
      display: block; width: 100%;
      padding: 14px;
      background: var(--green); color: #000;
      font-weight: 800; font-size: 1rem;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,200,150,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,200,150,0.1);
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem; color: var(--green);
      margin-bottom: 28px;
    }

    .hero-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1.0;
      margin-bottom: 28px;
      max-width: 700px;
    }

    h1 span { color: var(--green); }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    .btn-primary {
      padding: 16px 36px;
      background: var(--green); color: #000;
      font-weight: 700; font-size: 1rem;
      border: none; border-radius: 12px; cursor: pointer;
      text-decoration: none;
      transition: background 0.25s var(--ease), transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
      display: inline-block;
    }

    .btn-primary:hover { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,200,150,0.25); }

    .btn-secondary {
      padding: 16px 36px;
      background: transparent; color: var(--text);
      font-weight: 600; font-size: 1rem;
      border: 1px solid var(--border); border-radius: 12px;
      cursor: pointer; text-decoration: none;
      transition: border-color 0.25s var(--ease), transform 0.25s var(--ease), background 0.25s var(--ease);
      display: inline-block;
    }

    .btn-secondary:hover { border-color: var(--muted); transform: translateY(-2px); background: rgba(255,255,255,0.03); }

    .hero-trust {
      margin-top: 60px;
      display: flex; align-items: center; gap: 32px;
      flex-wrap: wrap; justify-content: center;
    }

    .trust-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted); }
    .trust-icon { color: var(--green); font-size: 1rem; }

    .hero-web-note {
      margin-top: 24px;
      font-size: 0.8rem; color: var(--muted);
    }


    /* SECTION COMMONS */
    section { padding: 100px 24px; max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--green);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800; letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .section-sub { font-size: 1.05rem; color: var(--muted); max-width: 560px; line-height: 1.7; }

    /* SCROLL-REVEAL ANIMATION SYSTEM (shared across sections) */
    .reveal {
      opacity: 0; transform: translateY(22px);
      transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
    }
    .reveal.in-view { opacity: 1; transform: translateY(0); }
    .reveal-group .reveal:nth-child(1) { transition-delay: 0s; }
    .reveal-group .reveal:nth-child(2) { transition-delay: 0.1s; }
    .reveal-group .reveal:nth-child(3) { transition-delay: 0.2s; }
    .reveal-group .reveal:nth-child(4) { transition-delay: 0.3s; }
    .reveal-group .reveal:nth-child(5) { transition-delay: 0.4s; }
    .reveal-group .reveal:nth-child(6) { transition-delay: 0.5s; }

    /* PROBLEM */
    .problem-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px; margin-top: 56px;
    }

    .problem-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }

    .problem-stat {
      font-size: 2.8rem; font-weight: 800; color: #ff4d4d;
      letter-spacing: -1px; margin-bottom: 8px;
    }

    .problem-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

    /* HOW IT WORKS STEPS */
    .steps-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0; margin-top: 56px; position: relative;
    }

    .steps-grid::before {
      content: '';
      position: absolute; top: 36px; left: calc(16.67% + 20px); right: calc(16.67% + 20px);
      height: 2px; background: linear-gradient(90deg, var(--green), var(--green-dark));
      opacity: 0.3;
    }

    .step-card {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 0 24px;
      position: relative;
    }

    .step-number {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(0,200,150,0.1);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: var(--green);
      margin-bottom: 24px; position: relative; z-index: 1;
    }

    .step-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    .step-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

    /* PRODUCT SHOWCASE */
    .showcase-wrap {
      display: grid; grid-template-columns: 380px 1fr;
      gap: 64px; align-items: center; max-width: 1100px; margin: 56px auto 0;
    }

    .showcase-phone {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; padding: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      opacity: 0; transform: translateY(28px) scale(0.97);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .showcase-phone.in-view { opacity: 1; transform: translateY(0) scale(1); }

    .showcase-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .showcase-logo { font-size: 1rem; font-weight: 800; color: var(--green); letter-spacing: -0.02em; }
    .showcase-email { font-size: 0.7rem; color: var(--muted); }

    .showcase-greeting { margin-bottom: 16px; }
    .showcase-greeting-title { font-size: 1.05rem; font-weight: 700; }
    .showcase-greeting-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .showcase-balance {
      background: linear-gradient(135deg, #0d2b22 0%, var(--surface) 100%);
      border: 1px solid rgba(0,200,150,0.25);
      border-radius: 16px; padding: 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .showcase-balance-label { font-size: 0.65rem; color: var(--green); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .showcase-balance-amount { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.03em; }
    .showcase-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.25);
      border-radius: 100px; padding: 4px 10px; font-size: 0.62rem; color: var(--green); font-weight: 600;
    }
    .showcase-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: showcasePulse 2s infinite; }
    @keyframes showcasePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .showcase-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .showcase-tile { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
    .showcase-tile-interactive { cursor: pointer; transition: border-color 0.3s var(--ease), transform 0.3s var(--ease); position: relative; }
    .showcase-tile-interactive:hover { border-color: var(--green); transform: translateY(-2px); }
    .showcase-tile-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .showcase-tile-value { font-size: 0.82rem; font-weight: 700; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.04em; }
    .showcase-masked { filter: blur(4px); transition: filter 0.25s; user-select: none; }
    .showcase-masked.revealed { filter: none; }
    .showcase-tile-hint { font-size: 0.58rem; color: var(--green); margin-top: 4px; opacity: 0.8; }

    .showcase-section-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 10px; }
    .showcase-txn-list { display: flex; flex-direction: column; gap: 4px; }
    .showcase-txn {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: 10px; background: var(--bg);
      opacity: 0; transform: translateX(-12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .showcase-phone.in-view .showcase-txn:nth-child(1) { transition-delay: 0.15s; }
    .showcase-phone.in-view .showcase-txn:nth-child(2) { transition-delay: 0.3s; }
    .showcase-phone.in-view .showcase-txn:nth-child(3) { transition-delay: 0.45s; }
    .showcase-phone.in-view .showcase-txn:nth-child(4) { transition-delay: 0.6s; }
    .showcase-phone.in-view .showcase-txn { opacity: 1; transform: translateX(0); }
    .showcase-txn-left { display: flex; align-items: center; gap: 10px; }
    .showcase-txn-icon {
      width: 28px; height: 28px; border-radius: 8px; background: var(--surface);
      display: flex; align-items: center; justify-content: center; font-size: 0.72rem; flex-shrink: 0;
    }
    .showcase-txn-desc { font-size: 0.78rem; font-weight: 600; }
    .showcase-txn-date { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
    .showcase-txn-amount { font-size: 0.8rem; font-weight: 700; }
    .showcase-txn-amount.showcase-credit { color: var(--green); }

    .showcase-callouts { display: flex; flex-direction: column; gap: 32px; }
    .showcase-callout {
      display: flex; gap: 16px;

      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .showcase-phone.in-view ~ .showcase-callouts .showcase-callout,
    .showcase-callouts.in-view .showcase-callout { opacity: 1; transform: translateX(0); }
    .showcase-callouts.in-view .showcase-callout:nth-child(1) { transition-delay: 0.2s; }
    .showcase-callouts.in-view .showcase-callout:nth-child(2) { transition-delay: 0.4s; }
    .showcase-callouts.in-view .showcase-callout:nth-child(3) { transition-delay: 0.6s; }
    .showcase-callout-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--green);
      margin-top: 6px; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(0,200,150,0.12);
    }
    .showcase-callout h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .showcase-callout p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    @media (max-width: 900px) {
      .showcase-wrap { grid-template-columns: 1fr; gap: 40px; }
      .showcase-phone { max-width: 380px; margin: 0 auto; }

    /* P2P PAYMENTS */
    .p2p-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 56px;
    }

    .p2p-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      transition: border-color 0.3s var(--ease), transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }

    .p2p-card:hover { border-color: var(--green); transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,0.28); }

    .p2p-icon {
      font-size: 2rem; margin-bottom: 20px;
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(0,200,150,0.1);
      display: flex; align-items: center; justify-content: center;
    }

    .p2p-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
    .p2p-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

    .p2p-safety {
      margin-top: 32px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      display: flex; gap: 20px; align-items: flex-start;
    }

    .p2p-safety-icon {
      font-size: 1.6rem; flex-shrink: 0;
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(0,200,150,0.1);
      display: flex; align-items: center; justify-content: center;
    }

    .p2p-safety h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
    .p2p-safety p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

    .p2p-scope-note {
      text-align: center; font-size: 0.78rem; color: var(--muted);
      margin-top: 28px; max-width: 700px; margin-left: auto; margin-right: auto; line-height: 1.6;
    }

    @media (max-width: 768px) {
      .p2p-grid { grid-template-columns: 1fr; }
      .p2p-safety { flex-direction: column; }
    }

    /* SOLUTION */
    .solution-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 56px;
    }

    .solution-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      transition: border-color 0.3s var(--ease), transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }

    .solution-card:hover { border-color: var(--green); transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,0.28); }

    .solution-icon {
      font-size: 2rem; margin-bottom: 20px;
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(0,200,150,0.1);
      display: flex; align-items: center; justify-content: center;
    }

    .solution-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
    .solution-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

    /* FEE COMPARISON */
    .compare-section { background: var(--surface); border-radius: 24px; padding: 56px; margin: 0 auto; max-width: 1100px; }

    .compare-table {
      width: 100%; border-collapse: collapse; margin-top: 40px;
    }

    .compare-table th {
      padding: 14px 20px; font-size: 0.82rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; text-align: left;
      border-bottom: 2px solid var(--border);
    }

    .compare-table th:first-child { color: var(--muted); }
    .compare-table th.col-chase { color: #ff4d4d; }
    .compare-table th.col-wells { color: #ff8c00; }
    .compare-table th.col-fawn { color: var(--green); }

    .compare-table td {
      padding: 14px 20px; font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table td:first-child { color: var(--muted); }

    .fee-bad-high { font-weight: 700; color: #ff4d4d; }
    .fee-bad-mid { font-weight: 700; color: #ff8c00; }
    .fee-good { font-weight: 700; color: var(--green); }

    .compare-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* SAVINGS CALCULATOR */
    .calc-widget {
      margin-top: 48px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px;
    }
    .calc-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .calc-sub { color: var(--muted); font-size: 0.88rem; }
    .calc-body { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 28px; align-items: center; }
    .calc-label { display: block; font-size: 0.85rem; color: var(--text); margin-bottom: 14px; font-weight: 600; }
    .calc-label span { color: var(--green); font-weight: 800; }
    #calc-slider {
      width: 100%; height: 6px; border-radius: 100px;
      background: var(--border); outline: none; -webkit-appearance: none; appearance: none;
      margin-bottom: 20px;
    }
    #calc-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%; background: var(--green);
      cursor: pointer; box-shadow: 0 0 0 4px rgba(0,200,150,0.15);
    }
    #calc-slider::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%; background: var(--green);
      border: none; cursor: pointer; box-shadow: 0 0 0 4px rgba(0,200,150,0.15);
    }
    .calc-checkbox-row { font-size: 0.85rem; color: var(--muted); }
    .calc-checkbox-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .calc-checkbox-row input { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }

    .calc-result-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--muted);
    }
    .calc-result-fawn { border-bottom: none; padding-top: 16px; font-weight: 700; color: var(--text); }
    .calc-result-amount { font-size: 1.1rem; font-weight: 800; transition: color 0.2s; }
    .calc-bad { color: #ff4d4d; }
    .calc-good { color: var(--green); font-size: 1.3rem; }
    .calc-savings-banner {
      margin-top: 18px; background: rgba(0,200,150,0.08); border: 1px solid rgba(0,200,150,0.25);
      border-radius: 12px; padding: 14px 18px; font-size: 0.9rem; color: var(--muted); text-align: center;
    }
    .calc-savings-banner strong { color: var(--green); font-size: 1.05rem; }

    @media (max-width: 700px) {
      .calc-body { grid-template-columns: 1fr; gap: 24px; }
    }

    .compare-winner-row td {
      padding-top: 24px; padding-bottom: 4px;
      font-size: 0.82rem; color: var(--muted); border-bottom: none;
    }

    .compare-winner-row td:last-child { color: var(--green); font-weight: 700; }

    /* SOCIAL PROOF */
    .testimonials-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 56px;
    }

    .testimonial-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px;

      font-style: italic;
    }

    .testimonial-author { font-size: 0.82rem; color: var(--muted); font-weight: 600; }

    /* PRICING */
    .pricing-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 56px;
    }

    .pricing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      position: relative;
    }

    .pricing-card.featured {
      border-color: var(--green);
      background: linear-gradient(135deg, rgba(0,200,150,0.08), var(--surface));
    }

    .pricing-badge {

    .pricing-name { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

    /* FAQ */
    .faq-list { margin-top: 56px; display: flex; flex-direction: column; gap: 0; }

    .savings-preview-grid {

      gap: 20px;
